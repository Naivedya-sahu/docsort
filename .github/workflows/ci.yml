name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m py_compile docsort/cli.py docsort/config.py docsort/gui.py
      - name: Install
        run: pip install .
      - name: Import check (CLI engine)
        run: python -c "import docsort.cli as c; assert hasattr(c, 'main')"
      - name: CLI smoke
        run: docsort --help
