name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install ".[gui]" pyinstaller flet
      - name: Build GUI exe (Flet)
        run: flet pack run_gui.py --name docsort-gui --product-name docsort -i docsort/docsort.ico --add-data "docsort/data;docsort/data" --pyinstaller-build-args=--paths=. -y
      - name: Build CLI exe
        run: pyinstaller --onefile --console --name docsort --icon docsort/docsort.ico --collect-all docsort run_cli.py
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/docsort-gui.exe
            dist/docsort.exe
          generate_release_notes: true
